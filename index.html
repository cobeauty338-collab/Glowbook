<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GlowBook - E-booking & Payment</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
<h2>Inscription Client</h2>
<form id="clientForm">
  <input type="text" id="clientName" placeholder="Nom" required />
  <input type="text" id="clientPhone" placeholder="Téléphone" required />
  <input type="password" id="clientPassword" placeholder="Mot de passe" required />
  <button type="submit">S'inscrire</button>
</form>

<h2>Inscription Prestataire</h2>
<form id="prestataireForm">
  <input type="text" id="salonName" placeholder="Nom du salon" required />
  <input type="text" id="address" placeholder="Adresse" required />
  <input type="password" id="password" placeholder="Mot de passe" required />
  <input type="text" id="services" placeholder="Services séparés par une virgule" required />
  <button type="submit">S'inscrire</button>
</form>

<h2>Portfolio Photos</h2>
<input type="file" id="photoInput" multiple />
<button id="uploadBtn">Upload</button>

<h2>Réservation & Paiement Mobile Money</h2>
<form id="bookingForm">
  <input type="text" id="prestataireId" placeholder="ID Prestataire" required />
  <input type="text" id="serviceId" placeholder="ID Service" required />
  <input type="text" id="amount" placeholder="Montant (XAF)" required />
  <button type="submit">Payer avec Mobile Money</button>
</form>

<script>
const supabaseUrl = 'xecvmzamdyzjggoqpccr.supabase.co';
const supabaseKey = 'eyJhbGci...'; // remplace par ta clé
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// -------------------- Client --------------------
document.getElementById('clientForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('clientName').value;
  const phone = document.getElementById('clientPhone').value;
  const password = document.getElementById('clientPassword').value;
  const { data, error } = await supabase.auth.signUp({ email: phone+'@glowbook.com', password });
  if (error) return alert(error.message);
  const { error: profileError } = await supabase.from('users').insert([{ id: data.user.id, role:'client', nom:name, phone }]);
  if (profileError) return alert(profileError.message);
  alert("Client inscrit !");
});

// -------------------- Prestataire --------------------
document.getElementById('prestataireForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const salonName = document.getElementById('salonName').value;
  const address = document.getElementById('address').value;
  const password = document.getElementById('password').value;
  const services = document.getElementById('services').value.split(',');
  const { data, error } = await supabase.auth.signUp({ email: salonName.replace(/\s+/g,'')+'@glowbook.com', password });
  if (error) return alert(error.message);
  const { error: profError } = await supabase.from('users').insert([{ id:data.user.id, role:'prestataire', salon_name:salonName, adresse:address }]);
  if (profError) return alert(profError.message);
  for (let s of services) { await supabase.from('services').insert([{ prestataire_id:data.user.id, service_name:s.trim() }]); }
  alert("Prestataire inscrit !");
});

// -------------------- Portfolio --------------------
document.getElementById('uploadBtn').addEventListener('click', async () => {
  const files = document.getElementById('photoInput').files;
  const user = supabase.auth.user();
  if (!user) return alert("Connectez-vous d'abord");
  for (let file of files) {
    const fileName = `${user.id}/${file.name}`;
    const { error } = await supabase.storage.from('portfolio').upload(fileName, file);
    if (error) return alert(error.message);
    const url = supabase.storage.from('portfolio').getPublicUrl(fileName).data.publicUrl;
    await supabase.from('photos').insert([{ prestataire_id: user.id, url }]);
  }
  alert("Photos uploadées !");
});

// -------------------- Payment Mobile Money --------------------
document.getElementById('bookingForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const prestataireId = document.getElementById('prestataireId').value;
  const serviceId = document.getElementById('serviceId').value;
  const amount = document.getElementById('amount').value;
  const client = supabase.auth.user();
  if (!client) return alert("Connectez-vous d'abord");

  // Ici tu appelleras ton API serveur qui fait la requête Mobile Money
  // Exemple placeholder fetch
  try {
    const response = await fetch('https://ton-serveur-api/payment', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        client_id: client.id,
        prestataire_id: prestataireId,
        service_id: serviceId,
        amount: amount,
        provider: 'MTN' // ou 'Airtel'
      })
    });
    const result = await response.json();
    if(result.success){
      alert("Paiement initié. Suivez la confirmation sur votre téléphone.");
      await supabase.from('bookings').insert([{ client_id: client.id, prestataire_id: prestataireId, service_id: serviceId, date:new Date(), payment_status:'pending' }]);
    } else {
      alert("Erreur paiement : " + result.message);
    }
  } catch(err) { alert("Erreur paiement : " + err.message); }
});
</script>
</body>
</html>
