<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GlowBook 💄</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0e0e;color:#f0ece4;font-family:'Helvetica Neue',sans-serif;max-width:420px;margin:0 auto;min-height:100vh}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 32px;background:radial-gradient(ellipse at 60% 20%,#2e1f0e 0%,#0f0e0e 60%)}
.logo{font-size:64px;margin-bottom:12px;text-align:center}
.app-name{font-size:36px;font-weight:800;color:#e8b86d;margin-bottom:8px}
.tagline{font-size:14px;color:#8a857d;text-align:center;margin-bottom:56px;line-height:1.5}
.role-card{width:100%;background:#1a1818;border:1px solid #2e2b28;border-radius:20px;padding:24px 28px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:18px;transition:all 0.2s}
.role-card:hover{transform:translateY(-2px)}
.role-icon{font-size:36px}
.role-title{font-size:18px;font-weight:700;margin-bottom:4px}
.role-desc{font-size:13px;color:#8a857d}
.arrow{margin-left:auto;font-size:20px}
.header{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2e2b28}
.header-title{font-size:20px;font-weight:700}
.back-btn{background:none;border:none;color:#e8b86d;font-size:15px;cursor:pointer;padding:4px 0}
.change-btn{background:none;border:none;color:#8a857d;font-size:12px;cursor:pointer}
.section{padding:20px 20px 0}
.section-title{font-size:13px;font-weight:600;color:#8a857d;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.card{background:#1a1818;border:1px solid #2e2b28;border-radius:16px;padding:18px;margin-bottom:12px}
input{width:100%;background:#111;border:1px solid #2e2b28;border-radius:10px;padding:12px 14px;color:#f0ece4;font-size:15px;box-sizing:border-box;margin-bottom:12px;font-family:inherit}
.btn{width:100%;background:#e8b86d;color:#1a1410;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px}
.btn-outline{width:100%;background:transparent;color:#e8b86d;border:1px solid #e8b86d;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(232,184,109,.12);color:#e8b86d;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:600}
.salon-card{background:#1a1818;border:1px solid #2e2b28;border-radius:16px;padding:18px;margin-bottom:12px;cursor:pointer;display:flex;gap:14px;align-items:flex-start}
.tab-bar{display:flex;background:#1a1818;border-top:1px solid #2e2b28;position:sticky;bottom:0}
.tab{flex:1;padding:14px 8px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;border:none;background:none;color:#8a857d}
.tab.active{color:#e8b86d}
.days-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none}
.day-chip{flex-shrink:0;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #2e2b28;background:transparent;color:#f0ece4}
.day-chip.selected{background:#e8b86d;color:#1a1410;border-color:#e8b86d}
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.slot{padding:12px 4px;border-radius:10px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2e2b28;background:transparent;color:#f0ece4}
.slot.selected{background:#e8b86d;color:#1a1410;border-color:#e8b86d}
.slot.taken{opacity:.4;cursor:not-allowed;text-decoration:line-through}
.error{color:#ff8080;font-size:13px;margin-bottom:8px}
.success-card{background:rgba(126,200,160,.06);border:1px solid #7ec8a0;border-radius:20px;padding:32px 24px;text-align:center;margin:32px 20px}
.booking-row{background:#1a1818;border:1px solid #2e2b28;border-radius:14px;padding:16px 18px;margin-bottom:10px}
.status-badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700}
.stat-card{background:#1a1818;border:1px solid #2e2b28;border-radius:16px;padding:20px;text-align:center}
.stat-value{font-size:26px;font-weight:800;color:#e8b86d;margin-bottom:4px}
.stat-label{font-size:12px;color:#8a857d}
.pb80{padding-bottom:80px}
.hero{background:linear-gradient(135deg,#2e1f0e,#1e1512);border-radius:18px;padding:22px 20px;margin-bottom:20px;border:1px solid #2e2b28}
</style>
</head>
<body>
<div id="app"></div>
<script>
const URL = "https://xecvmzamdyzjggoqpccr.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlY3ZtemFtZHl6amdnb3FwY2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTMxNDksImV4cCI6MjA5MDcyOTE0OX0.PaYTrpbWInqZuq2I6B-cV2IQof-0j98a8vnF3QIay9c";

const sb = async (table, method="GET", body=null, filter="") => {
  const r = await fetch(`${URL}/rest/v1/${table}${filter}`, {
    method, headers: {"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY,"Prefer":method==="POST"?"return=representation":""},
    body: body ? JSON.stringify(body) : null
  });
  if (!r.ok) throw new Error(await r.text());
  const t = await r.text(); return t ? JSON.parse(t) : [];
};

const TIMES = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00"];
const DAYS = ["Lun 7","Mar 8","Mer 9","Jeu 10","Ven 11","Sam 12","Dim 13"];
const PLANS = {
  starter:{label:"Starter",price:0,commission:8},
  standard:{label:"Standard",price:5000,commission:5},
  premium:{label:"Premium",price:12000,commission:3}
};

let state = {
  mode:"splash", clientView:"home",
  salons:[], salon:null, services:[], service:null,
  day:null, time:null, bookedSlots:[],
  clientName:"", clientPhone:"", confirmed:false,
  providerSalon:null, providerSetup:false,
  providerBookings:[], providerServices:[],
  providerTab:"agenda", filterDay:"all",
  pName:"", pSpecialty:"", pLocation:"",
  svcName:"", svcDuration:"", svcPrice:"",
  loading:false, error:""
};

function render() {
  const app = document.getElementById("app");
  if (state.mode === "splash") { app.innerHTML = splash(); bindSplash(); return; }
  if (state.mode === "client") { app.innerHTML = client(); bindClient(); return; }
  if (state.mode === "provider") { app.innerHTML = provider(); bindProvider(); return; }
}

function splash() {
  return `<div class="splash">
    <div class="logo">💄</div>
    <div class="app-name">GlowBook</div>
    <div class="tagline">Réservez vos soins beauté en quelques secondes.<br>Partout à Brazzaville.</div>
    <div class="role-card" id="go-client" style="border-color:rgba(232,184,109,0.3)">
      <div class="role-icon">👤</div>
      <div><div class="role-title">Je suis Client(e)</div><div class="role-desc">Trouver un salon & réserver</div></div>
      <div class="arrow" style="color:#e8b86d">→</div>
    </div>
    <div class="role-card" id="go-provider" style="border-color:rgba(232,143,160,0.3)">
      <div class="role-icon">💼</div>
      <div><div class="role-title">Je suis Prestataire</div><div class="role-desc">Gérer mon salon & mes RDV</div></div>
      <div class="arrow" style="color:#e88fa0">→</div>
    </div>
  </div>`;
}

function bindSplash() {
  document.getElementById("go-client").onclick = async () => {
    state.mode="client"; state.clientView="home"; render();
    const data = await sb("salons","GET",null,"?select=*");
    state.salons = data; render();
  };
  document.getElementById("go-provider").onclick = () => { state.mode="provider"; render(); };
}

function client() {
  const h = `<div style="min-height:100vh">
    <div class="header">
      ${state.clientView !== "home" ? `<button class="back-btn" id="back">← Retour</button>` : `<div class="header-title">💄 GlowBook</div>`}
      <button class="change-btn" id="change">Changer</button>
    </div>`;

  if (state.confirmed) return h + confirmedView() + "</div>";
  if (state.clientView === "home") return h + homeView() + "</div>";
  if (state.clientView === "salon") return h + salonView() + "</div>";
  if (state.clientView === "book") return h + bookView() + "</div>";
  return h + "</div>";
}

function confirmedView() {
  return `<div class="success-card">
    <div style="font-size:56px;margin-bottom:16px">✅</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:8px">Réservation envoyée !</div>
    <div style="color:#8a857d;font-size:14px;margin-bottom:24px">Le salon va confirmer votre RDV.</div>
    <div class="card" style="text-align:left;margin-bottom:16px">
      <div style="margin-bottom:8px"><span style="color:#8a857d;font-size:12px">SALON</span><br><strong>${state.salon?.name}</strong></div>
      <div style="margin-bottom:8px"><span style="color:#8a857d;font-size:12px">SERVICE</span><br><strong>${state.service?.name}</strong></div>
      <div style="display:flex;gap:20px">
        <div><span style="color:#8a857d;font-size:12px">JOUR</span><br><strong>${state.day}</strong></div>
        <div><span style="color:#8a857d;font-size:12px">HEURE</span><br><strong>${state.time}</strong></div>
        <div><span style="color:#8a857d;font-size:12px">PRIX</span><br><strong style="color:#e8b86d">${state.service?.price?.toLocaleString()} FCFA</strong></div>
      </div>
    </div>
    <button class="btn" id="new-booking">Nouvelle réservation</button>
  </div>`;
}

function homeView() {
  const salonsHtml = state.salons.length === 0
    ? `<div style="color:#8a857d;text-align:center;padding:40px">Aucun salon disponible pour l'instant</div>`
    : state.salons.map(s => `
      <div class="salon-card" data-id="${s.id}">
        <div style="font-size:40px">💇‍♀️</div>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;margin-bottom:3px">${s.name}</div>
          <div style="font-size:13px;color:#e8b86d;margin-bottom:6px">${s.specialty||""}</div>
          <div style="font-size:12px;color:#8a857d">📍 ${s.location||""}</div>
        </div>
        <div style="color:#8a857d">›</div>
      </div>`).join("");
  return `<div class="section">
    <div class="hero">
      <div style="font-size:13px;color:#8a857d;margin-bottom:6px">📍 Brazzaville</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:4px">Trouvez votre salon</div>
      <div style="font-size:13px;color:#8a857d">Réservez en 30 secondes</div>
    </div>
    <div class="section-title">Salons disponibles</div>
    ${state.error ? `<div class="error">${state.error}</div>` : ""}
    ${salonsHtml}
  </div>`;
}

function salonView() {
  const svcs = state.services.map(s => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 8px;border-bottom:1px solid #2e2b28;cursor:pointer;background:${state.service?.id===s.id?"rgba(232,184,109,0.08)":"transparent"};border-radius:10px" class="svc-row" data-id="${s.id}">
      <div>
        <div style="font-size:15px;font-weight:600">${s.name}</div>
        <div style="font-size:12px;color:#8a857d">⏱ ${s.duration_minutes} min ${state.service?.id===s.id?"✓":""}</div>
      </div>
      <div style="font-size:16px;font-weight:700;color:#e8b86d">${s.price?.toLocaleString()} FCFA</div>
    </div>`).join("");
  return `<div class="section">
    <div style="text-align:center;padding:16px 0 20px">
      <div style="font-size:56px">💇‍♀️</div>
      <div style="font-size:22px;font-weight:800">${state.salon?.name}</div>
      <div style="color:#e8b86d;font-size:14px">${state.salon?.specialty||""}</div>
      <div style="color:#8a857d;font-size:12px">📍 ${state.salon?.location||""}</div>
    </div>
    <div class="section-title">Choisissez un service</div>
    ${state.services.length===0?`<div style="color:#8a857d;text-align:center;padding:20px">Aucun service disponible</div>`:svcs}
    ${state.service ? `<button class="btn" id="go-book">Choisir un créneau →</button>` : ""}
  </div>`;
}

function bookView() {
  const daysHtml = DAYS.map(d => `<div class="day-chip ${state.day===d?"selected":""}" data-day="${d}">${d}</div>`).join("");
  const slotsHtml = state.day ? TIMES.map(t => {
    const taken = state.bookedSlots.includes(t);
    return `<div class="slot ${taken?"taken":""} ${state.time===t&&!taken?"selected":""}" data-time="${t}" ${taken?"":""}>${t}</div>`;
  }).join("") : "";
  return `<div class="section">
    <div style="background:rgba(232,184,109,0.08);border:1px solid #e8b86d;border-radius:12px;padding:14px 16px;margin-bottom:20px">
      <strong>${state.service?.name}</strong> — <span style="color:#e8b86d">${state.service?.price?.toLocaleString()} FCFA</span>
    </div>
    <input id="cname" placeholder="Votre nom complet" value="${state.clientName}"/>
    <input id="cphone" placeholder="Votre numéro MTN/Airtel" value="${state.clientPhone}"/>
    <div class="section-title">Choisissez un jour</div>
    <div class="days-row">${daysHtml}</div>
    ${state.day ? `<div class="section-title">Choisissez un créneau</div><div class="slots-grid">${slotsHtml}</div>` : ""}
    ${state.error ? `<div class="error">${state.error}</div>` : ""}
    ${state.time && state.clientName && state.clientPhone ? `<button class="btn" id="confirm-book" ${state.loading?"disabled":""}>
      ${state.loading?"Envoi...":"Confirmer · "+state.time+" "+state.day}
    </button>` : ""}
  </div>`;
}

function bindClient() {
  const q = id => document.getElementById(id);
  if (q("change")) q("change").onclick = () => { state.mode="splash"; render(); };
  if (q("back")) q("back").onclick = () => {
    if (state.clientView==="book") state.clientView="salon";
    else state.clientView="home";
    render();
  };
  if (q("new-booking")) q("new-booking").onclick = () => { state.confirmed=false; state.clientView="home"; state.salon=null; state.service=null; render(); };
  document.querySelectorAll(".salon-card").forEach(el => {
    el.onclick = async () => {
      state.salon = state.salons.find(s => s.id === el.dataset.id);
      state.clientView = "salon"; state.service = null; render();
      const data = await sb("services","GET",null,`?salon_id=eq.${state.salon.id}&select=*`);
      state.services = data; render();
    };
  });
  document.querySelectorAll(".svc-row").forEach(el => {
    el.onclick = () => { state.service = state.services.find(s => s.id === el.dataset.id); render(); bindClient(); };
  });
  if (q("go-book")) q("go-book").onclick = () => { state.clientView="book"; render(); bindClient(); };
  document.querySelectorAll(".day-chip").forEach(el => {
    el.onclick = async () => {
      state.day = el.dataset.day; state.time = null; render(); bindClient();
      const idx = DAYS.indexOf(state.day);
      const d = `2026-04-${String(idx+7).padStart(2,"0")}`;
      const data = await sb("bookings","GET",null,`?salon_id=eq.${state.salon.id}&booking_date=eq.${d}&status=neq.cancelled&select=booking_time`);
      state.bookedSlots = data.map(b => b.booking_time?.slice(0,5)); render(); bindClient();
    };
  });
  document.querySelectorAll(".slot:not(.taken)").forEach(el => {
    el.onclick = () => { state.time = el.dataset.time; render(); bindClient(); };
  });
  if (q("cname")) q("cname").oninput = e => state.clientName = e.target.value;
  if (q("cphone")) q("cphone").oninput = e => state.clientPhone = e.target.value;
  if (q("confirm-book")) q("confirm-book").onclick = async () => {
    if (!state.clientName || !state.clientPhone) { state.error="Remplis ton nom et numéro"; render(); bindClient(); return; }
    state.loading=true; state.error=""; render(); bindClient();
    try {
      const idx = DAYS.indexOf(state.day);
      await sb("bookings","POST",{
        client_name:state.clientName, client_phone:state.clientPhone,
        salon_id:state.salon.id, service_name:state.service.name,
        booking_date:`2026-04-${String(idx+7).padStart(2,"0")}`,
        booking_time:state.time, status:"pending", amount:state.service.price
      });
      state.confirmed=true;
    } catch(e) { state.error="Erreur: "+e.message; }
    state.loading=false; render(); bindClient();
  };
}

function provider() {
  if (!state.providerSetup) return providerSetup();
  return `<div>
    <div class="header">
      <div><div style="font-size:13px;color:#8a857d">Prestataire</div>
      <div style="font-size:18px;font-weight:700">💇‍♀️ ${state.providerSalon?.name}</div></div>
      <span class="badge">${PLANS[state.providerSalon?.subscription]?.label||"Starter"}</span>
    </div>
    <div class="pb80">
      ${state.providerTab==="agenda" ? agendaTab() : ""}
      ${state.providerTab==="services" ? servicesTab() : ""}
      ${state.providerTab==="stats" ? statsTab() : ""}
    </div>
    <div class="tab-bar">
      <button class="tab ${state.providerTab==="agenda"?"active":""}" id="tab-agenda"><div style="font-size:20px">📅</div>Agenda</button>
      <button class="tab ${state.providerTab==="services"?"active":""}" id="tab-services"><div style="font-size:20px">✂️</div>Services</button>
      <button class="tab ${state.providerTab==="stats"?"active":""}" id="tab-stats"><div style="font-size:20px">📊</div>Stats</button>
    </div>
  </div>`;
}

function providerSetup() {
  return `<div>
    <div class="header">
      <div style="font-size:20px;font-weight:700">💼 Espace Prestataire</div>
      <button class="change-btn" id="p-back">Retour</button>
    </div>
    <div class="section" style="padding-top:30px">
      <div style="font-size:22px;font-weight:800;margin-bottom:8px">Créez votre salon</div>
      <div style="color:#8a857d;font-size:14px;margin-bottom:24px">Configurez votre profil pour recevoir des réservations.</div>
      <input id="p-name" placeholder="Nom du salon *" value="${state.pName}"/>
      <input id="p-specialty" placeholder="Spécialité (ex: Tresses, Ongles...)" value="${state.pSpecialty}"/>
      <input id="p-location" placeholder="Localisation (ex: Poto-Poto)" value="${state.pLocation}"/>
      ${state.error ? `<div class="error">${state.error}</div>` : ""}
      <button class="btn" id="create-salon" ${state.loading?"disabled":""}>${state.loading?"Création...":"Créer mon salon →"}</button>
      <div style="margin-top:20px">
        <div class="section-title">Plans disponibles</div>
        ${Object.entries(PLANS).map(([k,p]) => `
          <div class="card" style="display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-weight:700">${p.label}</div><div style="font-size:12px;color:#8a857d">Commission : ${p.commission}%</div></div>
            <div style="font-weight:800">${p.price===0?"Gratuit":p.price.toLocaleString()+" FCFA/mois"}</div>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}

function agendaTab() {
  const filtered = state.filterDay==="all" ? state.providerBookings : state.providerBookings.filter(b=>b.booking_date===state.filterDay);
  const pending = state.providerBookings.filter(b=>b.status==="pending").length;
  const daysHtml = ["all",...DAYS].map(d=>`<div class="day-chip ${state.filterDay===d?"selected":""}" style="font-size:12px" data-fday="${d}">${d==="all"?"Tous":d}</div>`).join("");
  const bookingsHtml = filtered.length===0
    ? `<div style="color:#8a857d;text-align:center;padding:40px">Aucune réservation</div>`
    : filtered.map(b=>`
      <div class="booking-row">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <strong>${b.client_name}</strong>
          <span class="status-badge" style="background:${b.status==="confirmed"?"rgba(126,200,160,.12)":b.status==="cancelled"?"rgba(255,100,100,.12)":"rgba(232,184,109,.12)"};color:${b.status==="confirmed"?"#7ec8a0":b.status==="cancelled"?"#ff8080":"#e8b86d"}">
            ${b.status==="confirmed"?"Confirmé":b.status==="cancelled"?"Annulé":"En attente"}
          </span>
        </div>
        <div style="font-size:13px;color:#8a857d;margin-bottom:6px">${b.service_name}</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <span style="font-size:12px;background:#2e2b28;border-radius:6px;padding:3px 8px">📅 ${b.booking_date}</span>
          <span style="font-size:12px;background:#2e2b28;border-radius:6px;padding:3px 8px">🕐 ${b.booking_time?.slice(0,5)}</span>
          ${b.amount?`<span style="font-size:12px;background:#2e2b28;border-radius:6px;padding:3px 8px;color:#e8b86d">${b.amount?.toLocaleString()} FCFA</span>`:""}
        </div>
        <div style="font-size:11px;color:#8a857d;margin-bottom:8px">📞 ${b.client_phone}</div>
        ${b.status==="pending"?`
          <div style="display:flex;gap:8px">
            <button style="flex:1;background:#7ec8a0;color:#0f1a14;border:none;border-radius:10px;padding:10px;font-weight:700;cursor:pointer" class="accept-btn" data-id="${b.id}">✓ Accepter</button>
            <button style="flex:1;background:rgba(255,100,100,.12);color:#ff8080;border:1px solid rgba(255,100,100,.2);border-radius:10px;padding:10px;font-weight:700;cursor:pointer" class="cancel-btn" data-id="${b.id}">✕ Refuser</button>
          </div>`:""}
      </div>`).join("");
  return `<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title">Réservations</div>
      <span class="badge">${pending} en attente</span>
    </div>
    <div class="days-row">${daysHtml}</div>
    ${bookingsHtml}
  </div>`;
}

function servicesTab() {
  const svcsHtml = state.providerServices.map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 8px;border-bottom:1px solid #2e2b28">
      <div><div style="font-weight:600">${s.name}</div><div style="font-size:12px;color:#8a857d">⏱ ${s.duration_minutes} min</div></div>
      <div style="color:#e8b86d;font-weight:700">${s.price?.toLocaleString()} FCFA</div>
    </div>`).join("");
  return `<div class="section">
    <div class="section-title">Mes services</div>
    ${svcsHtml}
    <div style="margin-top:24px">
      <div class="section-title">Ajouter un service</div>
      <input id="svc-name" placeholder="Nom du service" value="${state.svcName}"/>
      <input id="svc-duration" placeholder="Durée (minutes)" type="number" value="${state.svcDuration}"/>
      <input id="svc-price" placeholder="Prix (FCFA)" type="number" value="${state.svcPrice}"/>
      ${state.error?`<div class="error">${state.error}</div>`:""}
      <button class="btn" id="add-svc" ${state.loading?"disabled":""}>${state.loading?"Ajout...":"+ Ajouter"}</button>
    </div>
  </div>`;
}

function statsTab() {
  const total = state.providerBookings.length;
  const confirmed = state.providerBookings.filter(b=>b.status==="confirmed").length;
  const pending = state.providerBookings.filter(b=>b.status==="pending").length;
  const revenue = state.providerBookings.filter(b=>b.status==="confirmed").reduce((s,b)=>s+(b.amount||0),0);
  const plan = state.providerSalon?.subscription || "starter";
  return `<div class="section">
    <div class="section-title">Tableau de bord</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total RDV</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#7ec8a0">${confirmed}</div><div class="stat-label">Confirmés</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#e88fa0">${pending}</div><div class="stat-label">En attente</div></div>
      <div class="stat-card"><div class="stat-value">${revenue.toLocaleString()}</div><div class="stat-label">Revenus FCFA</div></div>
    </div>
    <div class="section-title">Mon abonnement</div>
    ${Object.entries(PLANS).map(([k,p])=>`
      <div class="card" style="border:1px solid ${k===plan?"#e8b86d":"#2e2b28"};opacity:${k===plan?1:0.6}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-weight:700">${p.label} ${k===plan?"✓ Actif":""}</div>
          <div style="font-size:12px;color:#8a857d">Commission : ${p.commission}%</div></div>
          <div style="font-weight:800">${p.price===0?"Gratuit":p.price.toLocaleString()+" FCFA/mois"}</div>
        </div>
      </div>`).join("")}
  </div>`;
}

async function loadProviderData() {
  try {
    const b = await sb("bookings","GET",null,`?salon_id=eq.${state.providerSalon.id}&select=*&order=booking_date.asc`);
    state.providerBookings = b;
    const s = await sb("services","GET",null,`?salon_id=eq.${state.providerSalon.id}&select=*`);
    state.providerServices = s;
    render(); bindProvider();
  } catch {}
}

function bindProvider() {
  const q = id => document.getElementById(id);
  if (q("p-back")) q("p-back").onclick = () => { state.mode="splash"; render(); };
  if (q("p-name")) q("p-name").oninput = e => state.pName = e.target.value;
  if (q("p-specialty")) q("p-specialty").oninput = e => state.pSpecialty = e.target.value;
  if (q("p-location")) q("p-location").oninput = e => state.pLocation = e.target.value;
  if (q("create-salon")) q("create-salon").onclick = async () => {
    if (!state.pName) { state.error="Entre le nom de ton salon"; render(); bindProvider(); return; }
    state.loading=true; state.error=""; render(); bindProvider();
    try {
      const data = await sb("salons","POST",{name:state.pName,specialty:state.pSpecialty,location:state.pLocation,subscription:"starter"});
      state.providerSalon = Array.isArray(data) ? data[0] : data;
      state.providerSetup = true;
      await loadProviderData();
    } catch(e) { state.error="Erreur: "+e.message; }
    state.loading=false; render(); bindProvider();
  };
  if (q("tab-agenda")) q("tab-agenda").onclick = () => { state.providerTab="agenda"; loadProviderData(); };
  if (q("tab-services")) q("tab-services").onclick = () => { state.providerTab="services"; loadProviderData(); };
  if (q("tab-stats")) q("tab-stats").onclick = () => { state.providerTab="stats"; loadProviderData(); };
  document.querySelectorAll("[data-fday]").forEach(el => {
    el.onclick = () => { state.filterDay=el.dataset.fday; render(); bindProvider(); };
  });
  document.querySelectorAll(".accept-btn").forEach(el => {
    el.onclick = async () => { await sb("bookings","PATCH",{status:"confirmed"},`?id=eq.${el.dataset.id}`); loadProviderData(); };
  });
  document.querySelectorAll(".cancel-btn").forEach(el => {
    el.onclick = async () => { await sb("bookings","PATCH",{status:"cancelled"},`?id=eq.${el.dataset.id}`); loadProviderData(); };
  });
  if (q("svc-name")) q("svc-name").oninput = e => state.svcName = e.target.value;
  if (q("svc-duration")) q("svc-duration").oninput = e => state.svcDuration = e.target.value;
  if (q("svc-price")) q("svc-price").oninput = e => state.svcPrice = e.target.value;
  if (q("add-svc")) q("add-svc").onclick = async () => {
    if (!state.svcName||!state.svcPrice) return;
    state.loading=true; render(); bindProvider();
    try {
      await sb("services","POST",{salon_id:state.providerSalon.id,name:state.svcName,duration_minutes:parseInt(state.svcDuration)||60,price:parseInt(state.svcPrice)});
      state.svcName=""; state.svcDuration=""; state.svcPrice="";
      await loadProviderData();
    } catch(e) { state.error="Erreur: "+e.message; }
    state.loading=false; render(); bindProvider();
  };
}

render();
</script>
</body>
  </html>
