<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GlowBook 💄</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0e0e;color:#f0ece4;font-family:'Helvetica Neue',sans-serif;max-width:420px;margin:0 auto;min-height:100vh}
input,button,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 28px;background:radial-gradient(ellipse at 60% 20%,#2e1f0e 0%,#0f0e0e 60%)}
.role-card{width:100%;background:#1a1818;border:1px solid #2e2b28;border-radius:20px;padding:22px 24px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:16px}
.header{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2e2b28;position:sticky;top:0;background:#0f0e0e;z-index:10}
.sec{padding:16px 16px 0}
.sec-t{font-size:12px;font-weight:600;color:#8a857d;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.card{background:#1a1818;border:1px solid #2e2b28;border-radius:14px;padding:14px;margin-bottom:10px}
input{width:100%;background:#111;border:1px solid #2e2b28;border-radius:10px;padding:11px 13px;color:#f0ece4;font-size:15px;box-sizing:border-box;margin-bottom:10px}
.btn{width:100%;background:#e8b86d;color:#1a1410;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;margin-top:6px}
.btn:disabled{opacity:.5}
.btn-o{width:100%;background:transparent;color:#e8b86d;border:1px solid #e8b86d;border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-s{background:#e8b86d;color:#1a1410;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
.btn-r{background:rgba(255,100,100,.1);color:#ff8080;border:1px solid rgba(255,100,100,.2);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
.badge{display:inline-flex;align-items:center;background:rgba(232,184,109,.12);color:#e8b86d;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:600}
.err{color:#ff8080;font-size:13px;margin-bottom:8px;padding:8px 12px;background:rgba(255,100,100,.08);border-radius:8px}
.tab-bar{display:flex;background:#1a1818;border-top:1px solid #2e2b28;position:sticky;bottom:0;z-index:10}
.tab{flex:1;padding:12px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;border:none;background:none;color:#8a857d}
.tab.on{color:#e8b86d}
.days-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.dc{flex-shrink:0;padding:7px 11px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2e2b28;background:transparent;color:#f0ece4}
.dc.on{background:#e8b86d;color:#1a1410;border-color:#e8b86d}
.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.slot{padding:10px 4px;border-radius:10px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2e2b28;background:transparent}
.slot.on{background:#e8b86d;color:#1a1410;border-color:#e8b86d}
.slot.tk{opacity:.3;cursor:not-allowed;text-decoration:line-through}
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.ph{aspect-ratio:1;border-radius:10px;overflow:hidden;background:#111;border:1px solid #2e2b28;position:relative}
.ph img{width:100%;height:100%;object-fit:cover}
.ph-add{aspect-ratio:1;border-radius:10px;border:2px dashed #2e2b28;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:28px;background:#111}
.prov-card{background:#1a1818;border:1px solid #2e2b28;border-radius:16px;margin-bottom:12px;overflow:hidden;cursor:pointer}
.prov-photos{display:flex;gap:4px;overflow-x:auto;padding:10px 12px 0}
.pp{width:76px;height:76px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#111}
.pp img{width:100%;height:100%;object-fit:cover}
.pay-opt{background:#1a1818;border:2px solid #2e2b28;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px}
.pay-opt.on{border-color:#e8b86d;background:rgba(232,184,109,.06)}
.link{color:#e8b86d;font-size:13px;cursor:pointer;text-align:center;margin-top:10px;display:block}
.pb80{padding-bottom:80px}
.svc-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #2e2b28}
.svc-row:last-child{border-bottom:none}
.stat{background:#1a1818;border:1px solid #2e2b28;border-radius:14px;padding:16px;text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SB="https://xecvmzamdyzjggoqpccr.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlY3ZtemFtZHl6amdnb3FwY2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTMxNDksImV4cCI6MjA5MDcyOTE0OX0.PaYTrpbWInqZuq2I6B-cV2IQof-0j98a8vnF3QIay9c";

const db=async(table,method="GET",body=null,filter="")=>{
  const r=await fetch(`${SB}/rest/v1/${table}${filter}`,{
    method,
    headers:{"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY,"Prefer":method==="POST"?"return=representation":""},
    body:body?JSON.stringify(body):null
  });
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):[];
};

const TIMES=["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00"];
const DAYS=["Lun 7","Mar 8","Mer 9","Jeu 10","Ven 11","Sam 12","Dim 13"];

let S={
  page:"splash",
  // client auth
  cView:"home",client:null,
  cName:"",cPhone:"",cPass:"",authMode:"login",
  // client booking
  salons:[],salon:null,svcs:[],svc:null,
  day:null,time:null,takenSlots:[],
  payMethod:"mtn",payPhone:"",booked:false,
  // provider auth
  pView:"setup",provider:null,provSalon:null,
  pSalonName:"",pAddress:"",pPhone:"",pPass:"",pAuthMode:"login",
  pTab:"agenda",
  pBookings:[],pSvcs:[],pPhotos:[],
  svcName:"",svcDur:"",svcPrice:"",
  filterDay:"all",
  loading:false,err:""
};

const $=id=>document.getElementById(id);
const Q=sel=>document.querySelector(sel);
const R=()=>{$("app").innerHTML=build();bind()};

function build(){
  if(S.page==="splash")return splash();
  if(S.page==="client")return clientPages();
  if(S.page==="provider")return providerPages();
  return "";
}

// ===== SPLASH =====
function splash(){
  return `<div class="splash">
    <div style="font-size:60px;margin-bottom:10px">💄</div>
    <div style="font-size:34px;font-weight:800;color:#e8b86d;margin-bottom:6px">GlowBook</div>
    <div style="font-size:13px;color:#8a857d;text-align:center;margin-bottom:50px;line-height:1.5">Réservez vos soins beauté en quelques secondes.<br>Partout à Brazzaville.</div>
    <div class="role-card" id="go-c" style="border-color:rgba(232,184,109,.3)">
      <div style="font-size:34px">👤</div>
      <div><div style="font-size:17px;font-weight:700;margin-bottom:3px">Je suis Client(e)</div><div style="font-size:12px;color:#8a857d">Trouver un salon & réserver</div></div>
      <div style="margin-left:auto;color:#e8b86d;font-size:18px">→</div>
    </div>
    <div class="role-card" id="go-p" style="border-color:rgba(232,143,160,.3)">
      <div style="font-size:34px">💼</div>
      <div><div style="font-size:17px;font-weight:700;margin-bottom:3px">Je suis Prestataire</div><div style="font-size:12px;color:#8a857d">Gérer mon salon & mes RDV</div></div>
      <div style="margin-left:auto;color:#e88fa0;font-size:18px">→</div>
    </div>
  </div>`;
}

// ===== CLIENT AUTH =====
function clientAuth(){
  if(S.authMode==="register") return `
    <div class="sec" style="padding-top:24px">
      <div style="font-size:22px;font-weight:800;margin-bottom:6px">Créer un compte</div>
      <div style="color:#8a857d;font-size:13px;margin-bottom:20px">Rejoignez GlowBook gratuitement</div>
      <input id="c-name" placeholder="Votre nom complet" value="${S.cName}"/>
      <input id="c-phone" placeholder="Numéro MTN/Airtel" type="tel" value="${S.cPhone}"/>
      <input id="c-pass" placeholder="Mot de passe" type="password" value="${S.cPass}"/>
      ${S.err?`<div class="err">${S.err}</div>`:""}
      <button class="btn" id="c-register" ${S.loading?"disabled":""}>
        ${S.loading?"Création...":"Créer mon compte"}
      </button>
      <span class="link" id="go-login">Déjà un compte ? Se connecter</span>
    </div>`;
  return `
    <div class="sec" style="padding-top:24px">
      <div style="font-size:22px;font-weight:800;margin-bottom:6px">Connexion</div>
      <div style="color:#8a857d;font-size:13px;margin-bottom:20px">Bienvenue sur GlowBook</div>
      <input id="c-phone" placeholder="Numéro de téléphone" type="tel" value="${S.cPhone}"/>
      <input id="c-pass" placeholder="Mot de passe" type="password" value="${S.cPass}"/>
      ${S.err?`<div class="err">${S.err}</div>`:""}
      <button class="btn" id="c-login" ${S.loading?"disabled":""}>
        ${S.loading?"Connexion...":"Se connecter"}
      </button>
      <span class="link" id="go-register">Pas encore de compte ? S'inscrire</span>
    </div>`;
}

// ===== CLIENT PAGES =====
function clientPages(){
  const hdr=`<div class="header">
    ${S.cView!=="home"?`<button class="btn-back" id="c-back" style="background:none;border:none;color:#e8b86d;font-size:15px;cursor:pointer">← Retour</button>`
    :`<div style="font-size:18px;font-weight:700">💄 GlowBook</div>`}
    ${S.client
      ?`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:#8a857d">${S.client.name}</span><button class="btn-back" id="c-logout" style="background:none;border:none;color:#8a857d;font-size:12px;cursor:pointer">Déco</button></div>`
      :`<button class="btn-back" id="go-cauth" style="background:none;border:none;color:#e8b86d;font-size:13px;cursor:pointer">Connexion</button>`}
  </div>`;

  if(!S.client && S.cView==="auth") return `<div>${hdr}${clientAuth()}</div>`;
  if(S.booked) return `<div>${hdr}${bookedView()}</div>`;
  if(S.cView==="home") return `<div>${hdr}${homeView()}</div>`;
  if(S.cView==="salon") return `<div>${hdr}${salonView()}</div>`;
  if(S.cView==="book") return `<div>${hdr}${bookView()}</div>`;
  if(S.cView==="pay") return `<div>${hdr}${payView()}</div>`;
  return `<div>${hdr}${homeView()}</div>`;
}

function homeView(){
  const cards=S.salons.length===0
    ?`<div style="color:#8a857d;text-align:center;padding:40px 0">Aucun salon disponible pour l'instant</div>`
    :S.salons.map(s=>`
      <div class="prov-card" data-sid="${s.id}">
        ${s.photos&&s.photos.length>0?`<div class="prov-photos">${s.photos.slice(0,4).map(p=>`<div class="pp"><img src="${p}" loading="lazy"/></div>`).join("")}</div>`:""}
        <div style="padding:12px">
          <div style="font-size:16px;font-weight:700;margin-bottom:3px">${s.name}</div>
          <div style="font-size:13px;color:#e8b86d;margin-bottom:4px">${s.specialty||""}</div>
          <div style="font-size:12px;color:#8a857d">📍 ${s.location||s.address||""}</div>
        </div>
      </div>`).join("");
  return `<div class="sec pb80">
    <div style="background:linear-gradient(135deg,#2e1f0e,#1e1512);border-radius:14px;padding:18px;margin-bottom:16px;border:1px solid #2e2b28">
      <div style="font-size:12px;color:#8a857d;margin-bottom:4px">📍 Brazzaville</div>
      <div style="font-size:19px;font-weight:700;margin-bottom:3px">Trouvez votre salon</div>
      <div style="font-size:12px;color:#8a857d">Réservez en 30 secondes</div>
    </div>
    <div class="sec-t">Salons disponibles</div>
    ${S.err?`<div class="err">${S.err}</div>`:""}
    ${cards}
  </div>`;
}

function salonView(){
  if(!S.salon) return homeView();
  const photos=S.salon.photos&&S.salon.photos.length>0
    ?`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px">${S.salon.photos.map(p=>`<div style="width:100px;height:100px;flex-shrink:0;border-radius:10px;overflow:hidden"><img src="${p}" style="width:100%;height:100%;object-fit:cover" loading="lazy"/></div>`).join("")}</div>`
    :"";
  const svcs=S.svcs.length===0
    ?`<div style="color:#8a857d;text-align:center;padding:16px">Aucun service disponible</div>`
    :S.svcs.map(sv=>`
      <div class="svc-row" data-svid="${sv.id}" style="cursor:pointer;background:${S.svc&&S.svc.id===sv.id?"rgba(232,184,109,.08)":"transparent"};border-radius:10px;padding:13px 8px">
        <div>
          <div style="font-size:15px;font-weight:600">${sv.name} ${S.svc&&S.svc.id===sv.id?"✓":""}</div>
          <div style="font-size:12px;color:#8a857d">⏱ ${sv.duration_minutes} min</div>
        </div>
        <div style="font-size:15px;font-weight:700;color:#e8b86d">${Number(sv.price).toLocaleString()} FCFA</div>
      </div>`).join("");
  return `<div class="sec pb80">
    <div style="text-align:center;padding:14px 0 18px">
      <div style="font-size:50px">💇‍♀️</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:3px">${S.salon.name}</div>
      <div style="font-size:13px;color:#e8b86d;margin-bottom:4px">${S.salon.specialty||""}</div>
      <div style="font-size:12px;color:#8a857d">📍 ${S.salon.location||S.salon.address||""}</div>
    </div>
    ${photos.length>0?`<div class="sec-t">Portfolio</div>${photos}`:""}
    <div class="sec-t">Services</div>
    <div>${svcs}</div>
    ${S.svc?`<button class="btn" id="go-book">Choisir un créneau →</button>`:""}
  </div>`;
}

function bookView(){
  const daysHtml=DAYS.map(d=>`<div class="dc ${S.day===d?"on":""}" data-d="${d}">${d}</div>`).join("");
  const slotsHtml=S.day?TIMES.map(t=>{
    const tk=S.takenSlots.includes(t);
    return `<div class="slot ${tk?"tk":""} ${S.time===t&&!tk?"on":""}" data-t="${t}">${t}</div>`;
  }).join(""):"";
  return `<div class="sec pb80">
    <div style="background:rgba(232,184,109,.08);border:1px solid #e8b86d;border-radius:12px;padding:12px 14px;margin-bottom:16px">
      <div style="font-weight:700">${S.svc.name}</div>
      <div style="font-size:13px;color:#8a857d">⏱ ${S.svc.duration_minutes} min · <span style="color:#e8b86d">${Number(S.svc.price).toLocaleString()} FCFA</span></div>
    </div>
    ${!S.client?`<div class="err">⚠️ Connectez-vous pour réserver</div><button class="btn" id="go-auth-book">Se connecter / S'inscrire</button>`:`
    <div class="sec-t">Choisissez un jour</div>
    <div class="days-row">${daysHtml}</div>
    ${S.day?`<div class="sec-t">Créneaux disponibles</div><div class="slots">${slotsHtml}</div>`:""}
    ${S.err?`<div class="err">${S.err}</div>`:""}
    ${S.time?`<button class="btn" id="go-pay">Continuer vers le paiement →</button>`:""}
    `}
  </div>`;
}

function payView(){
  return `<div class="sec pb80">
    <div style="font-size:18px;font-weight:800;margin-bottom:6px">Paiement</div>
    <div style="color:#8a857d;font-size:13px;margin-bottom:18px">Payez en toute sécurité par Mobile Money</div>
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:13px;color:#8a857d;margin-bottom:4px">RÉCAPITULATIF</div>
      <div style="font-weight:700">${S.svc.name} · ${S.salon.name}</div>
      <div style="font-size:13px;color:#8a857d">${S.day} à ${S.time}</div>
      <div style="font-size:18px;font-weight:800;color:#e8b86d;margin-top:6px">${Number(S.svc.price).toLocaleString()} FCFA</div>
    </div>
    <div class="sec-t">Moyen de paiement</div>
    <div class="pay-opt ${S.payMethod==="mtn"?"on":""}" id="pay-mtn">
      <div style="font-size:28px">📱</div>
      <div><div style="font-weight:700">MTN Mobile Money</div><div style="font-size:12px;color:#8a857d">Payer avec votre compte MTN</div></div>
    </div>
    <div class="pay-opt ${S.payMethod==="airtel"?"on":""}" id="pay-airtel">
      <div style="font-size:28px">📲</div>
      <div><div style="font-weight:700">Airtel Money</div><div style="font-size:12px;color:#8a857d">Payer avec votre compte Airtel</div></div>
    </div>
    <input id="pay-phone" placeholder="Numéro ${S.payMethod==="mtn"?"MTN":"Airtel"} (ex: 06XXXXXXXX)" type="tel" value="${S.payPhone}" style="margin-top:10px"/>
    ${S.err?`<div class="err">${S.err}</div>`:""}
    <button class="btn" id="do-pay" ${S.loading?"disabled":""}>${S.loading?"Traitement en cours...":"Confirmer et payer"}</button>
    <div style="font-size:12px;color:#8a857d;text-align:center;margin-top:10px">🔒 Paiement sécurisé via CinetPay</div>
  </div>`;
}

function bookedView(){
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">✅</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:8px">Réservation confirmée !</div>
    <div style="color:#8a857d;font-size:14px;margin-bottom:24px">Votre RDV a été envoyé au salon.</div>
    <div class="card" style="width:100%;text-align:left;margin-bottom:20px">
      <div style="margin-bottom:8px"><span style="color:#8a857d;font-size:12px">SALON</span><br><strong>${S.salon?.name}</strong></div>
      <div style="margin-bottom:8px"><span style="color:#8a857d;font-size:12px">SERVICE</span><br><strong>${S.svc?.name}</strong></div>
      <div style="display:flex;gap:16px;margin-bottom:8px">
        <div><span style="color:#8a857d;font-size:12px">JOUR</span><br><strong>${S.day}</strong></div>
        <div><span style="color:#8a857d;font-size:12px">HEURE</span><br><strong>${S.time}</strong></div>
      </div>
      <div><span style="color:#8a857d;font-size:12px">PAIEMENT</span><br><strong style="color:#7ec8a0">✓ ${Number(S.svc?.price).toLocaleString()} FCFA · ${S.payMethod==="mtn"?"MTN Money":"Airtel Money"}</strong></div>
    </div>
    <button class="btn" id="new-book">Nouvelle réservation</button>
  </div>`;
}

// ===== PROVIDER PAGES =====
function providerPages(){
  if(S.pView==="auth") return providerAuth();
  if(S.pView==="setup") return providerSetup();
  return providerDashboard();
}

function providerAuth(){
  if(S.pAuthMode==="register") return `
    <div class="header">
      <div style="font-size:18px;font-weight:700">💼 Inscription</div>
      <button style="background:none;border:none;color:#8a857d;font-size:12px;cursor:pointer" id="p-tosplash">Accueil</button>
    </div>
    <div class="sec" style="padding-top:20px">
      <input id="p-phone" placeholder="Numéro de téléphone" type="tel" value="${S.pPhone}"/>
      <input id="p-pass" placeholder="Mot de passe" type="password" value="${S.pPass}"/>
      ${S.err?`<div class="err">${S.err}</div>`:""}
      <button class="btn" id="p-register" ${S.loading?"disabled":""}>${S.loading?"Inscription...":"S'inscrire"}</button>
      <span class="link" id="p-tologin">Déjà un compte ? Se connecter</span>
    </div>`;
  return `
    <div class="header">
      <div style="font-size:18px;font-weight:700">💼 Connexion</div>
      <button style="background:none;border:none;color:#8a857d;font-size:12px;cursor:pointer" id="p-tosplash">Accueil</button>
    </div>
    <div class="sec" style="padding-top:20px">
      <input id="p-phone" placeholder="Numéro de téléphone" type="tel" value="${S.pPhone}"/>
      <input id="p-pass" placeholder="Mot de passe" type="password" value="${S.pPass}"/>
      ${S.err?`<div class="err">${S.err}</div>`:""}
      <button class="btn" id="p-login" ${S.loading?"disabled":""}>${S.loading?"Connexion...":"Se connecter"}</button>
      <span class="link" id="p-toregister">Pas encore de compte ? S'inscrire</span>
    </div>`;
}

function providerSetup(){
  return `
    <div class="header">
      <div style="font-size:18px;font-weight:700">💼 Mon salon</div>
      <button style="background:none;border:none;color:#8a857d;font-size:12px;cursor:pointer" id="p-tosplash">Accueil</button>
    </div>
    <div class="sec" style="padding-top:20px">
      <div style="font-size:20px;font-weight:800;margin-bottom:6px">Créez votre salon</div>
      <div style="color:#8a857d;font-size:13px;margin-bottom:18px">Configurez votre profil pour recevoir des réservations</div>
      <input id="p-sname" placeholder="Nom du salon *" value="${S.pSalonName}"/>
      <input id="p-addr" placeholder="Adresse du salon *" value="${S.pAddress}"/>
      <input id="p-phone" placeholder="Numéro de téléphone *" type="tel" value="${S.pPhone}"/>
      <input id="p-pass" placeholder="Mot de passe *" type="password" value="${S.pPass}"/>
      ${S.err?`<div class="err">${S.err}</div>`:""}
      <button class="btn" id="p-create" ${S.loading?"disabled":""}>${S.loading?"Création...":"Créer mon salon →"}</button>
      <span class="link" id="p-toauth">Déjà un salon ? Se connecter</span>
    </div>`;
}

function providerDashboard(){
  const salon=S.provSalon;
  return `<div>
    <div class="header">
      <div>
        <div style="font-size:12px;color:#8a857d">Prestataire</div>
        <div style="font-size:16px;font-weight:700">💇‍♀️ ${salon?.name||""}</div>
      </div>
      <button style="background:none;border:none;color:#8a857d;font-size:12px;cursor:pointer" id="p-logout">Déconnexion</button>
    </div>
    <div class="pb80">
      ${S.pTab==="agenda"?agendaTab():""}
      ${S.pTab==="portfolio"?portfolioTab():""}
      ${S.pTab==="services"?servicesTab():""}
      ${S.pTab==="stats"?statsTab():""}
    </div>
    <div class="tab-bar">
      <button class="tab ${S.pTab==="agenda"?"on":""}" id="pt-agenda"><div style="font-size:18px">📅</div>Agenda</button>
      <button class="tab ${S.pTab==="portfolio"?"on":""}" id="pt-portfolio"><div style="font-size:18px">🖼️</div>Portfolio</button>
      <button class="tab ${S.pTab==="services"?"on":""}" id="pt-services"><div style="font-size:18px">✂️</div>Services</button>
      <button class="tab ${S.pTab==="stats"?"on":""}" id="pt-stats"><div style="font-size:18px">📊</div>Stats</button>
    </div>
  </div>`;
}

function agendaTab(){
  const pending=S.pBookings.filter(b=>b.status==="pending").length;
  const filtered=S.filterDay==="all"?S.pBookings:S.pBookings.filter(b=>b.booking_date===S.filterDay);
  const daysHtml=["all",...DAYS].map(d=>`<div class="dc ${S.filterDay===d?"on":""}" style="font-size:11px" data-fd="${d}">${d==="all"?"Tous":d}</div>`).join("");
  const bookings=filtered.length===0
    ?`<div style="color:#8a857d;text-align:center;padding:40px">Aucune réservation</div>`
    :filtered.map(b=>`
      <div class="booking-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <strong>${b.client_name||"Client"}</strong>
          <span style="font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;background:${b.status==="confirmed"?"rgba(126,200,160,.12)":b.status==="cancelled"?"rgba(255,100,100,.12)":"rgba(232,184,109,.12)"};color:${b.status==="confirmed"?"#7ec8a0":b.status==="cancelled"?"#ff8080":"#e8b86d"}">
            ${b.status==="confirmed"?"Confirmé":b.status==="cancelled"?"Annulé":"En attente"}
          </span>
        </div>
        <div style="font-size:13px;color:#8a857d;margin-bottom:6px">${b.service_name}</div>
        <div style="display:flex;gap:8px;margin-bottom:6px">
          <span style="font-size:12px;background:#2e2b28;border-radius:6px;padding:2px 8px">📅 ${b.booking_date}</span>
          <span style="font-size:12px;background:#2e2b28;border-radius:6px;padding:2px 8px">🕐 ${b.booking_time?.slice(0,5)}</span>
          ${b.amount?`<span style="font-size:12px;background:#2e2b28;border-radius:6px;padding:2px 8px;color:#e8b86d">${Number(b.amount).toLocaleString()} F</span>`:""}
        </div>
        ${b.client_phone?`<div style="font-size:12px;color:#8a857d;margin-bottom:6px">📞 ${b.client_phone}</div>`:""}
        ${b.status==="pending"?`<div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-s accept-b" data-bid="${b.id}">✓ Accepter</button>
          <button class="btn-r cancel-b" data-bid="${b.id}">✕ Refuser</button>
        </div>`:""}
      </div>`).join("");
  return `<div class="sec">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec-t" style="margin-bottom:0">Réservations</div>
      <span class="badge">${pending} en attente</span>
    </div>
    <div class="days-row">${daysHtml}</div>
    ${bookings}
  </div>`;
}

function portfolioTab(){
  const photos=S.pPhotos||[];
  const grid=photos.map(p=>`<div class="ph"><img src="${p}" loading="lazy"/></div>`).join("");
  return `<div class="sec">
    <div class="sec-t">Mes réalisations</div>
    <div class="photos-grid">
      ${grid}
      <div class="ph-add" id="add-photo">+</div>
    </div>
    <input type="file" id="photo-input" accept="image/*" style="display:none" multiple/>
    <div style="color:#8a857d;font-size:12px;text-align:center">Ajoutez des photos de vos réalisations pour attirer plus de clients</div>
  </div>`;
}

function servicesTab(){
  const svcs=S.pSvcs.map(s=>`
    <div class="svc-row">
      <div>
        <div style="font-weight:600">${s.name}</div>
        <div style="font-size:12px;color:#8a857d">⏱ ${s.duration_minutes} min</div>
      </div>
      <div style="color:#e8b86d;font-weight:700">${Number(s.price).toLocaleString()} FCFA</div>
    </div>`).join("");
  return `<div class="sec">
    <div class="sec-t">Mes services</div>
    <div class="card">${S.pSvcs.length===0?`<div style="color:#8a857d;text-align:center;padding:10px">Aucun service</div>`:svcs}</div>
    <div class="sec-t" style="margin-top:16px">Ajouter un service</div>
    <input id="svc-name" placeholder="Nom du service" value="${S.svcName}"/>
    <input id="svc-dur" placeholder="Durée (minutes)" type="number" value="${S.svcDur}"/>
    <input id="svc-price" placeholder="Prix (FCFA)" type="number" value="${S.svcPrice}"/>
    ${S.err?`<div class="err">${S.err}</div>`:""}
    <button class="btn" id="add-svc" ${S.loading?"disabled":""}>${S.loading?"Ajout...":"+ Ajouter le service"}</button>
  </div>`;
}

function statsTab(){
  const total=S.pBookings.length;
  const confirmed=S.pBookings.filter(b=>b.status==="confirmed").length;
  const pending=S.pBookings.filter(b=>b.status==="pending").length;
  const revenue=S.pBookings.filter(b=>b.status==="confirmed").reduce((s,b)=>s+(Number(b.amount)||0),0);
  return `<div class="sec">
    <div class="sec-t">Tableau de bord</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="stat"><div style="font-size:26px;font-weight:800;color:#e8b86d;margin-bottom:3px">${total}</div><div style="font-size:12px;color:#8a857d">Total RDV</div></div>
      <div class="stat"><div style="font-size:26px;font-weight:800;color:#7ec8a0;margin-bottom:3px">${confirmed}</div><div style="font-size:12px;color:#8a857d">Confirmés</div></div>
      <div class="stat"><div style="font-size:26px;font-weight:800;color:#e88fa0;margin-bottom:3px">${pending}</div><div style="font-size:12px;color:#8a857d">En attente</div></div>
      <div class="stat"><div style="font-size:22px;font-weight:800;color:#e8b86d;margin-bottom:3px">${revenue.toLocaleString()}</div><div style="font-size:12px;color:#8a857d">FCFA reçus</div></div>
    </div>
    <div class="sec-t">Photos publiées</div>
    <div class="card" style="text-align:center">
      <div style="font-size:26px;font-weight:800;color:#e8b86d">${(S.pPhotos||[]).length}</div>
      <div style="font-size:12px;color:#8a857d">photos dans le portfolio</div>
    </div>
  </div>`;
}

// ===== LOAD DATA =====
async function loadSalons(){
  try{
    const data=await db("salons","GET",null,"?select=*");
    S.salons=data;
  }catch(e){S.err="Erreur chargement: "+e.message;}
}

async function loadProviderData(){
  if(!S.provSalon)return;
  try{
    const[b,sv]=await Promise.all([
      db("bookings","GET",null,`?salon_id=eq.${S.provSalon.id}&select=*&order=booking_date.asc`),
      db("services","GET",null,`?salon_id=eq.${S.provSalon.id}&select=*`)
    ]);
    S.pBookings=b;S.pSvcs=sv;
    // load photos from salon
    const s=await db("salons","GET",null,`?id=eq.${S.provSalon.id}&select=photos`);
    if(s&&s[0])S.pPhotos=s[0].photos||[];
  }catch{}
}

// ===== BIND =====
function bind(){
  const on=(id,ev,fn)=>{const el=$(id);if(el)el[ev]=fn};
  const onAll=(sel,ev,fn)=>document.querySelectorAll(sel).forEach(el=>el[ev]=fn);

  // splash
  on("go-c","onclick",async()=>{
    S.page="client";S.cView="home";S.err="";R();
    await loadSalons();R();
  });
  on("go-p","onclick",()=>{S.page="provider";S.pView="setup";S.err="";R();});

  // client nav
  on("go-cauth","onclick",()=>{S.cView="auth";S.authMode="login";S.err="";R();});
  on("c-back","onclick",()=>{
    if(S.cView==="auth")S.cView="home";
    else if(S.cView==="salon")S.cView="home";
    else if(S.cView==="book")S.cView="salon";
    else if(S.cView==="pay")S.cView="book";
    S.err="";R();
  });
  on("c-logout","onclick",()=>{S.client=null;S.cView="home";R();});
  on("go-auth-book","onclick",()=>{S.cView="auth";S.authMode="login";S.err="";R();});

  // client auth inputs
  on("c-name","oninput",e=>S.cName=e.target.value);
  on("c-phone","oninput",e=>S.cPhone=e.target.value);
  on("c-pass","oninput",e=>S.cPass=e.target.value);
  on("go-login","onclick",()=>{S.authMode="login";S.err="";R();});
  on("go-register","onclick",()=>{S.authMode="register";S.err="";R();});

  on("c-register","onclick",async()=>{
    if(!S.cName||!S.cPhone||!S.cPass){S.err="Tous les champs sont obligatoires";R();bind();return;}
    S.loading=true;S.err="";R();bind();
    try{
      // check if exists
      const existing=await db("users","GET",null,`?phone=eq.${S.cPhone}&role=eq.client&select=id,name,phone`);
      if(existing&&existing.length>0){S.err="Ce numéro est déjà utilisé";S.loading=false;R();bind();return;}
      const data=await db("users","POST",{name:S.cName,phone:S.cPhone,password:S.cPass,role:"client"});
      S.client=Array.isArray(data)?data[0]:data;
      S.cView="home";S.loading=false;R();bind();
      await loadSalons();R();bind();
    }catch(e){S.err="Erreur: "+e.message;S.loading=false;R();bind();}
  });

  on("c-login","onclick",async()=>{
    if(!S.cPhone||!S.cPass){S.err="Remplis tous les champs";R();bind();return;}
    S.loading=true;S.err="";R();bind();
    try{
      const data=await db("users","GET",null,`?phone=eq.${S.cPhone}&password=eq.${S.cPass}&role=eq.client&select=*`);
      if(!data||data.length===0){S.err="Numéro ou mot de passe incorrect";S.loading=false;R();bind();return;}
      S.client=data[0];S.cView="home";S.loading=false;R();bind();
      await loadSalons();R();bind();
    }catch(e){S.err="Erreur: "+e.message;S.loading=false;R();bind();}
  });

  // salon cards
  onAll(".prov-card","onclick",async function(){
    const sid=this.dataset.sid;
    S.salon=S.salons.find(s=>s.id===sid);
    S.svc=null;S.cView="salon";R();bind();
    const svcs=await db("services","GET",null,`?salon_id=eq.${sid}&select=*`);
    S.svcs=svcs;R();bind();
  });

  // service select
  onAll(".svc-row","onclick",function(){
    S.svc=S.svcs.find(s=>s.id===this.dataset.svid);R();bind();
  });
  on("go-book","onclick",()=>{S.cView="book";S.err="";R();bind();});

  // day/time select
  onAll("[data-d]","onclick",async function(){
    S.day=this.dataset.d;S.time=null;R();bind();
    const idx=DAYS.indexOf(S.day);
    const dt=`2026-04-${String(idx+7).padStart(2,"0")}`;
    const taken=await db("bookings","GET",null,`?salon_id=eq.${S.salon.id}&booking_date=eq.${dt}&status=neq.cancelled&select=booking_time`);
    S.takenSlots=taken.map(b=>b.booking_time?.slice(0,5));R();bind();
  });
  onAll(".slot:not(.tk)","onclick",function(){S.time=this.dataset.t;R();bind();});

  on("go-pay","onclick",()=>{S.cView="pay";S.err="";R();bind();});

  // payment
  on("pay-mtn","onclick",()=>{S.payMethod="mtn";R();bind();});
  on("pay-airtel","onclick",()=>{S.payMethod="airtel";R();bind();});
  on("pay-phone","oninput",e=>S.payPhone=e.target.value);

  on("do-pay","onclick",async()=>{
    if(!S.payPhone){S.err="Entre ton numéro "+( S.payMethod==="mtn"?"MTN":"Airtel");R();bind();return;}
    S.loading=true;S.err="";R();bind();
    try{
      const idx=DAYS.indexOf(S.day);
      await db("bookings","POST",{
        client_name:S.client?.name||"Client",
        client_phone:S.client?.phone||S.payPhone,
        salon_id:S.salon.id,
        service_name:S.svc.name,
        booking_date:`2026-04-${String(idx+7).padStart(2,"0")}`,
        booking_time:S.time,
        status:"pending",
        amount:S.svc.price,
        payment_method:S.payMethod,
        payment_phone:S.payPhone
      });
      S.booked=true;
    }catch(e){S.err="Erreur paiement: "+e.message;}
    S.loading=false;R();bind();
  });

  on("new-book","onclick",()=>{
    S.booked=false;S.svc=null;S.day=null;S.time=null;S.payPhone="";
    S.cView="home";R();bind();
  });

  // provider setup
  on("p-tosplash","onclick",()=>{S.page="splash";R();});
  on("p-toauth","onclick",()=>{S.pView="auth";S.pAuthMode="login";S.err="";R();});
  on("p-tologin","onclick",()=>{S.pAuthMode="login";S.err="";R();});
  on("p-toregister","onclick",()=>{S.pAuthMode="register";S.err="";R();});
  on("p-phone","oninput",e=>S.pPhone=e.target.value);
  on("p-pass","oninput",e=>S.pPass=e.target.value);
  on("p-sname","oninput",e=>S.pSalonName=e.target.value);
  on("p-addr","oninput",e=>S.pAddress=e.target.value);

  on("p-create","onclick",async()=>{
    if(!S.pSalonName||!S.pAddress||!S.pPhone||!S.pPass){S.err="Tous les champs sont obligatoires";R();bind();return;}
    S.loading=true;S.err="";R();bind();
    try{
      const data=await db("salons","POST",{name:S.pSalonName,location:S.pAddress,phone:S.pPhone,password:S.pPass,subscription:"starter",photos:[]});
      S.provSalon=Array.isArray(data)?data[0]:data;
      S.pView="dashboard";S.loading=false;
      await loadProviderData();R();bind();
    }catch(e){S.err="Erreur: "+e.message;S.loading=false;R();bind();}
  });

  on("p-login","onclick",async()=>{
    if(!S.pPhone||!S.pPass){S.err="Remplis tous les champs";R();bind();return;}
    S.loading=true;S.err="";R();bind();
    try{
      const data=await db("salons","GET",null,`?phone=eq.${S.pPhone}&password=eq.${S.pPass}&select=*`);
      if(!data||data.length===0){S.err="Numéro ou mot de passe incorrect";S.loading=false;R();bind();return;}
      S.provSalon=data[0];S.pView="dashboard";S.loading=false;
      await loadProviderData();R();bind();
    }catch(e){S.err="Erreur: "+e.message;S.loading=false;R();bind();}
  });

  on("p-register","onclick",async()=>{
    if(!S.pPhone||!S.pPass){S.err="Remplis tous les champs";R();bind();return;}
    S.loading=true;S.err="";R();bind();
    try{
      const data=await db("salons","POST",{name:"Mon Salon",phone:S.pPhone,password:S.pPass,subscription:"starter",photos:[]});
      S.provSalon=Array.isArray(data)?data[0]:data;
      S.pView="dashboard";S.loading=false;
      await loadProviderData();R();bind();
    }catch(e){S.err="Erreur: "+e.message;S.loading=false;R();bind();}
  });

  on("p-logout","onclick",()=>{S.provSalon=null;S.pView="setup";S.page="splash";R();});

  // provider tabs
  on("pt-agenda","onclick",async()=>{S.pTab="agenda";await loadProviderData();R();bind();});
  on("pt-portfolio","onclick",async()=>{S.pTab="portfolio";await loadProviderData();R();bind();});
  on("pt-services","onclick",async()=>{S.pTab="services";await loadProviderData();R();bind();});
  on("pt-stats","onclick",async()=>{S.pTab="stats";await loadProviderData();R();bind();});

  // filter days
  onAll("[data-fd]","onclick",function(){S.filterDay=this.dataset.fd;R();bind();});

  // accept/cancel bookings
  onAll(".accept-b","onclick",async function(){
    await db("bookings","PATCH",{status:"confirmed"},`?id=eq.${this.dataset.bid}`);
    await loadProviderData();R();bind();
  });
  onAll(".cancel-b","onclick",async function(){
    await db("bookings","PATCH",{status:"cancelled"},`?id=eq.${this.dataset.bid}`);
    await loadProviderData();R();bind();
  });

  // services
  on("svc-name","oninput",e=>S.svcName=e.target.value);
  on("svc-dur","oninput",e=>S.svcDur=e.target.value);
  on("svc-price","oninput",e=>S.svcPrice=e.target.value);
  on("add-svc","onclick",async()=>{
    if(!S.svcName||!S.svcPrice){S.err="Nom et prix requis";R();bind();return;}
    S.loading=true;S.err="";R();bind();
    try{
      await db("services","POST",{salon_id:S.provSalon.id,name:S.svcName,duration_minutes:parseInt(S.svcDur)||60,price:parseInt(S.svcPrice)});
      S.svcName="";S.svcDur="";S.svcPrice="";
      await loadProviderData();
    }catch(e){S.err="Erreur: "+e.message;}
    S.loading=false;R();bind();
  });

  // photos
  on("add-photo","onclick",()=>{$("photo-input")?.click();});
  on("photo-input","onchange",async function(){
    const files=Array.from(this.files);
    if(!files.length)return;
    S.loading=true;R();bind();
    try{
      const urls=[];
      for(const f of files){
        const r=await fetch(`${SB}/storage/v1/object/portfolio/${S.provSalon.id}/${Date.now()}-${f.name}`,{
          method:"POST",
          headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":f.type,"x-upsert":"true"},
          body:f
        });
        if(r.ok){
          const url=`${SB}/storage/v1/object/public/portfolio/${S.provSalon.id}/${Date.now()}-${f.name}`;
          urls.push(url);
        }
      }
      const newPhotos=[...(S.pPhotos||[]),...urls];
      await db("salons","PATCH",{photos:newPhotos},`?id=eq.${S.provSalon.id}`);
      S.pPhotos=newPhotos;
    }catch(e){
      // fallback: use object URL for display
      const urls=files.map(f=>URL.createObjectURL(f));
      S.pPhotos=[...(S.pPhotos||[]),...urls];
    }
    S.loading=false;R();bind();
  });
}

R();
</script>
</body>
</html>
